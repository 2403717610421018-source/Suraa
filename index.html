<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>something i need to say… 🐱</title>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
  :root {
    --ink:#2b1a20; --rose:#d94f6b; --blush:#f7c5cf;
    --paper:#fff8f0; --lined:#f9eded; --rule:#f0d5d9;
  }
  html,body{ width:100%; height:100%; background:#e8ddd5;
    font-family:'Caveat',cursive; color:var(--ink); overflow:hidden; }

  /* BOOK */
  #book{
    position:relative; width:min(820px,98vw); height:min(580px,96vh);
    margin:auto; top:50%; left:50%; transform:translate(-50%,-50%);
  }

  /* PAGE */
  .page{
    position:absolute; inset:0; background:var(--paper);
    border-radius:4px 16px 16px 4px;
    box-shadow:4px 6px 30px rgba(0,0,0,.18),inset -2px 0 8px rgba(0,0,0,.06);
    display:flex; align-items:stretch; overflow:hidden;
    opacity:0; pointer-events:none; transition:opacity .05s;
  }
  .page.active{ opacity:1; pointer-events:all; z-index:10; }
  .page.flip-out{ animation:flipOut .5s cubic-bezier(.7,0,.3,1) forwards; z-index:20; pointer-events:none; }
  .page.flip-in { animation:flipIn  .5s cubic-bezier(.7,0,.3,1) forwards; z-index:5; }
  @keyframes flipOut{ from{transform:rotateY(0);opacity:1} to{transform:rotateY(-90deg);opacity:0} }
  @keyframes flipIn { from{transform:rotateY(90deg);opacity:0} to{transform:rotateY(0);opacity:1} }

  /* SPINE */
  .spine{
    width:28px; flex-shrink:0;
    background:linear-gradient(to right,#c9a0aa,#e8b4be);
    border-radius:4px 0 0 4px;
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:8px;
  }
  .spine-dot{ width:6px; height:6px; border-radius:50%; background:#fff6; }

  /* LINED BODY */
  .page-body{
    flex:1;
    background:var(--lined);
    background-image:repeating-linear-gradient(transparent,transparent 31px,var(--rule) 31px,var(--rule) 32px);
    background-position:0 38px;
    padding:38px 36px 20px 28px;
    display:flex; flex-direction:column;
    position:relative; overflow:hidden;
  }
  .page-body::before{
    content:''; position:absolute; left:68px; top:0; bottom:0;
    width:1.5px; background:rgba(217,79,107,.3);
  }
  .page-num{ position:absolute; bottom:14px; right:22px; font-size:1rem; color:#c9a0aa; }

  /* TEXT */
  .typed-area{ flex:1; padding-left:48px; padding-top:4px; position:relative; }
  .line{ font-size:clamp(1.1rem,2.6vw,1.45rem); line-height:32px; color:var(--ink); min-height:32px; }
  .line.heading{ font-size:clamp(1.5rem,4vw,2rem); font-weight:700; color:var(--rose); }
  .line.small{ font-size:clamp(.9rem,2vw,1.1rem); color:#8a5060; }
  .line.gap{ height:32px; }
  .line.center{ text-align:center; padding-left:0; }
  .cursor{ display:inline-block; width:2px; height:1.1em; background:var(--rose);
    vertical-align:text-bottom; margin-left:1px; animation:blink .8s step-end infinite; }
  @keyframes blink{ 0%,100%{opacity:1} 50%{opacity:0} }

  /* STICKER */
  .sticker{ position:absolute; font-size:1.8rem; transform:rotate(var(--r,-8deg));
    filter:drop-shadow(1px 2px 3px rgba(0,0,0,.15)); user-select:none; }

  /* ── CSS CAT ── */
  .cat-wrap{
    position:absolute; right:22px; bottom:36px;
    display:flex; flex-direction:column; align-items:center; gap:4px;
  }
  .cat-label{
    font-family:'Caveat',cursive; font-size:.85rem; color:#7a4050;
    background:white; padding:2px 8px; border-radius:8px;
    box-shadow:1px 2px 6px rgba(0,0,0,.12);
  }
  .cat-card{
    background:white; padding:8px 8px 8px;
    box-shadow:2px 4px 16px rgba(0,0,0,.18);
    border-radius:3px;
    transform:rotate(var(--cr,2deg));
  }
  .cat-svg{ display:block; }

  /* CAT ANIMATIONS */
  @keyframes tailWag{
    0%,100%{transform-origin:top center;transform:rotate(-20deg)}
    50%{transform:rotate(20deg)}
  }
  @keyframes earTwitch{
    0%,90%,100%{transform:rotate(0)} 95%{transform:rotate(-8deg)}
  }
  @keyframes eyeBlink{
    0%,94%,100%{transform:scaleY(1)} 97%{transform:scaleY(0.05)}
  }
  @keyframes bodyBob{
    0%,100%{transform:translateY(0)} 50%{transform:translateY(-2px)}
  }
  @keyframes tearDrop{
    0%{transform:translateY(0);opacity:1}
    100%{transform:translateY(12px);opacity:0}
  }
  @keyframes heartPop{
    0%,100%{transform:scale(1)} 50%{transform:scale(1.3)}
  }
  @keyframes pawWave{
    0%,100%{transform:rotate(0deg)} 50%{transform:rotate(-25deg)}
  }

  /* PROMISE */
  .promise-item{
    display:flex; align-items:center; gap:10px;
    line-height:32px; font-size:clamp(1rem,2.4vw,1.3rem);
    color:var(--ink); cursor:pointer;
  }
  .promise-item .box{
    width:18px; height:18px; border:2px solid var(--rose); border-radius:3px;
    flex-shrink:0; display:flex; align-items:center; justify-content:center;
    font-size:1rem; transition:background .2s;
  }
  .promise-item.checked .box{ background:var(--rose); color:white; }

  /* NAV */
  .nav{
    position:absolute; bottom:-52px; width:100%;
    display:flex; justify-content:center; gap:18px;
  }
  .nav-btn{
    background:white; border:2px solid var(--blush); color:var(--rose);
    font-family:'Caveat',cursive; font-size:1.1rem;
    padding:.4rem 1.6rem; border-radius:30px; cursor:pointer;
    box-shadow:0 3px 12px rgba(217,79,107,.15);
    transition:background .2s,transform .15s;
  }
  .nav-btn:hover{ background:var(--blush); transform:translateY(-2px); }
  .nav-btn:disabled{ opacity:.35; cursor:default; transform:none; }

  /* DOTS */
  .dots{
    position:absolute; bottom:-78px; width:100%;
    display:flex; justify-content:center; gap:10px;
  }
  .dot{ width:8px; height:8px; border-radius:50%; background:#d0b8bb; transition:background .3s,transform .3s; }
  .dot.on{ background:var(--rose); transform:scale(1.3); }

  /* FORGIVE BTN */
  .forgive-btn{
    display:block; margin:8px auto 0;
    background:linear-gradient(135deg,var(--rose),#b83255);
    color:white; border:none; font-family:'Caveat',cursive;
    font-size:1.4rem; padding:.6rem 2.2rem; border-radius:40px;
    cursor:pointer; box-shadow:0 6px 22px rgba(217,79,107,.35);
    transition:transform .2s,box-shadow .2s;
  }
  .forgive-btn:hover{ transform:scale(1.06); }

  /* CONFETTI */
  .conf-piece{
    position:fixed; pointer-events:none;
    animation:confDrop linear forwards; z-index:999;
  }
  @keyframes confDrop{
    0%{opacity:1;transform:translateY(0) rotate(0)}
    100%{opacity:0;transform:translateY(100vh) rotate(540deg)}
  }
  .heart-burst{
    position:fixed; font-size:1.4rem; pointer-events:none;
    animation:burstOut .9s ease-out forwards; z-index:999;
  }
  @keyframes burstOut{
    0%{opacity:1;transform:translate(0,0) scale(1)}
    100%{opacity:0;transform:translate(var(--tx),var(--ty)) scale(1.5)}
  }
</style>

// dots
const dotsEl=document.getElementById('dots');
pages.forEach((_,i)=>{
  const d=document.createElement('div');
  d.className='dot'+(i===0?' on':'');
  d.onclick=()=>{if(!typing)goTo(i);};
  dotsEl.appendChild(d);
});

function typeLines(idx,cb){
  const ta=document.getElementById('ta'+idx);
  ta.innerHTML=''; typing=true;
  let i=0;
  function next(){
    if(i>=pages[idx].length){typing=false;if(cb)cb();return;}
    const item=pages[idx][i++];
    if(item.type==='line gap'){
      const el=document.createElement('div'); el.className='line gap';
      ta.appendChild(el); setTimeout(next,80); return;
    }
    if(item.type==='button'){
      setTimeout(()=>{
        const btn=document.createElement('button');
        btn.className='forgive-btn'; btn.textContent='💗 yes, i forgive you 💗';
        btn.onclick=onForgiven; ta.appendChild(btn);
        typing=false; if(cb)cb();
      },300); return;
    }
    if(item.type==='promise'){
      const wrap=document.createElement('div'); wrap.className='promise-item';
      wrap.innerHTML='<div class="box"></div><span></span>';
      ta.appendChild(wrap);
      wrap.onclick=()=>{
        wrap.classList.toggle('checked');
        wrap.querySelector('.box').textContent=wrap.classList.contains('checked')?'✓':'';
      };
      typeText(wrap.querySelector('span'),item.text,next); return;
    }
    const el=document.createElement('div');
    const cls=['line'];
    if(item.type.includes('heading'))cls.push('heading');
    if(item.type.includes('small'))cls.push('small');
    if(item.type.includes('center'))cls.push('center');
    el.className=cls.join(' ');
    ta.appendChild(el);
    typeText(el,item.text,next);
  }
  next();
}

function typeText(el,text,done){
  let c=0;
  const cur=document.createElement('span'); cur.className='cursor';
  el.appendChild(cur);
  function tick(){
    if(c>=text.length){cur.remove();setTimeout(done,60+Math.random()*80);return;}
    el.insertBefore(document.createTextNode(text[c]),cur); c++;
    const ch=text[c-1];
    let d=28+Math.random()*38;
    if(ch==='.'||ch==='?'||ch==='!')d=180+Math.random()*120;
    else if(ch===',')d=100;
    else if(ch===' ')d=18;
    if(Math.random()<.04)d+=250+Math.random()*200;
    setTimeout(tick,d);
  }
  tick();
}

function goTo(idx){
  if(idx<0||idx>=pages.length||idx===current)return;
  const out=document.getElementById('p'+current);
  const inp=document.getElementById('p'+idx);
  out.classList.remove('active'); out.classList.add('flip-out');
  inp.classList.add('active','flip-in');
  setTimeout(()=>{out.classList.remove('flip-out');inp.classList.remove('flip-in');},550);
  current=idx; updateUI(); typeLines(idx);
}
function changePage(d){if(!typing)goTo(current+d);}
function updateUI(){
  document.getElementById('prevBtn').disabled=current===0;
  document.getElementById('nextBtn').disabled=current===pages.length-1;
  document.querySelectorAll('.dot').forEach((d,i)=>d.classList.toggle('on',i===current));
}

function onForgiven(){
  const colors=['#e8637a','#f2a7b5','#ffd700','#ff85a1','#a8e6cf','#ffb3c6'];
  for(let i=0;i<110;i++){
    const c=document.createElement('div'); c.className='conf-piece';
    c.style.left=Math.random()*100+'vw'; c.style.top='-12px';
    c.style.width=c.style.height=(6+Math.random()*10)+'px';
    c.style.background=colors[Math.floor(Math.random()*colors.length)];
    c.style.borderRadius=Math.random()>.5?'50%':'2px';
    const dur=1.8+Math.random()*1.8;
    c.style.animation=`confDrop ${dur}s ${Math.random()*1.2}s ease forwards`;
    document.body.appendChild(c);
  }
  const hearts=['💗','💖','💕','🐱','✨','🌹','😻'];
  for(let i=0;i<16;i++){
    const h=document.createElement('div'); h.className='heart-burst';
    h.textContent=hearts[Math.floor(Math.random()*hearts.length)];
    h.style.left=(20+Math.random()*60)+'vw'; h.style.top=(20+Math.random()*50)+'vh';
    const ang=Math.random()*360, dist=80+Math.random()*120;
    h.style.setProperty('--tx',Math.cos(ang)*dist+'px');
    h.style.setProperty('--ty',Math.sin(ang)*dist+'px');
    h.style.animationDelay=Math.random()*.4+'s';
    document.body.appendChild(h);
  }
  const btn=document.querySelector('.forgive-btn');
  if(btn){ btn.style.display='none';
    const ta=document.getElementById('ta4');
    const msg=document.createElement('div'); msg.className='line heading center'; ta.appendChild(msg);
    typeText(msg,'omg YAYYYY 🎉🐱💕',()=>{
      const sub=document.createElement('div'); sub.className='line small center'; ta.appendChild(sub);
      typeText(sub,'i love you so so so much 🥺',()=>{});
    });
  }
  setTimeout(()=>document.querySelectorAll('.conf-piece,.heart-burst').forEach(e=>e.remove()),6000);
}

typeLines(0);
</script>
</body>
